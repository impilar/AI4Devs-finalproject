services:
  postgres:
    image: postgres:16-alpine
    container_name: okc-postgres
    environment:
      POSTGRES_USER: okc
      POSTGRES_PASSWORD: okc
      POSTGRES_DB: okc
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U okc -d okc"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: ../infra/Dockerfile.backend
    container_name: okc-backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://okc:okc@postgres:5432/okc
      PORT: "3000"
      CORS_ORIGIN: http://localhost:5173
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: ../infra/Dockerfile.frontend
      args:
        VITE_API_URL: http://localhost:3000/api/v1
    container_name: okc-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
